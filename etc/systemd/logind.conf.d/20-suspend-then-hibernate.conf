[Login]
# Override lid close and power button to use suspend-then-hibernate.
# Deployed on machines with broken S0ix (AMD Phoenix) where s2idle
# drains battery at near-active rates. After HibernateDelaySec (see
# sleep.conf.d), the machine auto-hibernates to disk (0W).
HandleLidSwitch=suspend-then-hibernate
HandlePowerKey=suspend-then-hibernate
