[Login]
# Power button suspends instead of powering off. logind properly debounces
# the wake-from-suspend key event, unlike niri which re-suspends immediately
# (niri issue #2233). PowerKeyIgnoreInhibited=yes ensures the power button
# always works as an escape hatch, even when the sleep-inhibitor plugin is active.
HandlePowerKey=suspend
PowerKeyIgnoreInhibited=yes

# Allow sleep inhibitors (e.g. Noctalia sleep-inhibitor plugin) to block
# lid-close suspend. Default is "yes" which ignores all inhibitors on lid events.
# With "no", closing the lid while a block-mode sleep inhibitor is active
# will keep the system running (useful for downloads, long tasks).
# When no block inhibitor is held, lid close suspends normally.
LidSwitchIgnoreInhibited=no
